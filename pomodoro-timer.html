<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            min-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .mode-display {
            font-size: 1.2rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .mode-display.break {
            color: #27ae60;
        }

        .timer-display {
            font-size: 5rem;
            font-weight: bold;
            color: #333;
            margin: 2rem 0;
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        button {
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .start-btn {
            background: #667eea;
            color: white;
        }

        .start-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .pause-btn {
            background: #f39c12;
            color: white;
        }

        .pause-btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .reset-btn {
            background: #e74c3c;
            color: white;
        }

        .reset-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        button:disabled:hover {
            transform: none;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 1s linear;
        }

        .progress.break {
            background: linear-gradient(90deg, #27ae60 0%, #2ecc71 100%);
        }

        .session-count {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pomodoro Timer</h1>
        <div class="mode-display" id="modeDisplay">Focus Time</div>
        <div class="progress-bar">
            <div class="progress" id="progressBar"></div>
        </div>
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="controls">
            <button class="start-btn" id="startBtn">Start</button>
            <button class="pause-btn" id="pauseBtn" disabled>Pause</button>
            <button class="reset-btn" id="resetBtn">Reset</button>
        </div>
        <div class="session-count" id="sessionCount">Sessions completed: 0</div>
    </div>

    <script>
        const FOCUS_TIME = 25 * 60; // 25 minutes in seconds
        const BREAK_TIME = 10 * 60; // 10 minutes in seconds

        let timeRemaining = FOCUS_TIME;
        let totalTime = FOCUS_TIME;
        let timerInterval = null;
        let isRunning = false;
        let isFocusMode = true;
        let sessionsCompleted = 0;

        const timerDisplay = document.getElementById('timerDisplay');
        const modeDisplay = document.getElementById('modeDisplay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressBar = document.getElementById('progressBar');
        const sessionCount = document.getElementById('sessionCount');

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerDisplay.textContent = formatTime(timeRemaining);
            const progress = ((totalTime - timeRemaining) / totalTime) * 100;
            progressBar.style.width = `${progress}%`;
        }

        function playSound() {
            // Create a simple beep sound using Web Audio API
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.frequency.value = 800;
            oscillator.type = 'sine';

            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }

        function switchMode() {
            isFocusMode = !isFocusMode;

            if (isFocusMode) {
                totalTime = FOCUS_TIME;
                timeRemaining = FOCUS_TIME;
                modeDisplay.textContent = 'Focus Time';
                modeDisplay.classList.remove('break');
                progressBar.classList.remove('break');
            } else {
                totalTime = BREAK_TIME;
                timeRemaining = BREAK_TIME;
                modeDisplay.textContent = 'Break Time';
                modeDisplay.classList.add('break');
                progressBar.classList.add('break');
                sessionsCompleted++;
                sessionCount.textContent = `Sessions completed: ${sessionsCompleted}`;
            }

            updateDisplay();
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                startBtn.disabled = true;
                pauseBtn.disabled = false;

                timerInterval = setInterval(() => {
                    timeRemaining--;
                    updateDisplay();

                    if (timeRemaining <= 0) {
                        playSound();
                        pauseTimer();
                        switchMode();
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
        }

        function resetTimer() {
            pauseTimer();
            isFocusMode = true;
            totalTime = FOCUS_TIME;
            timeRemaining = FOCUS_TIME;
            modeDisplay.textContent = 'Focus Time';
            modeDisplay.classList.remove('break');
            progressBar.classList.remove('break');
            updateDisplay();
        }

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);

        // Initialize display
        updateDisplay();
    </script>
</body>
</html>
